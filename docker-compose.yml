services:
  homelab-blog:
    image: ghcr.io/strausmann/homelab-blog:latest
    container_name: homelab-blog
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
