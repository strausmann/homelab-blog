services:
  homelab-blog:
    image: ghcr.io/strausmann/homelab-blog:latest
    container_name: homelab-blog
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
